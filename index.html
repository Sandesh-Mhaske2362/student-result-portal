<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Result Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    /* Attractive gradient background */
    body {
        background: linear-gradient(135deg, #667eea, #764ba2, #6a11cb);
    }

    /* Fade animation ONLY for card */
    @keyframes fadeCard {
        from {
            opacity: 0;
            transform: translateY(25px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .login-card {
        animation: fadeCard 0.9s ease;
        border-radius: 15px;
    }
</style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 shadow login-card" style="width:380px;">
    <h4 class="text-center mb-3">🎓 Student Result Portal</h4>

    <input id="roll_no" class="form-control mb-3" placeholder="Roll Number">
    <input id="mother_name" class="form-control mb-3" placeholder="Mother's Name">

    <button class="btn btn-primary w-100" onclick="goToResult()">Get Result</button>
</div>

<script>
function goToResult() {
    const roll = document.getElementById("roll_no").value;
    const mother = document.getElementById("mother_name").value;

    if (!roll || !mother) {
        alert("Please fill all fields");
        return;
    }

    window.location.href =
        `result.html?roll_no=${roll}&mother_name=${mother}`;
}
</script>

</body>
</html>
